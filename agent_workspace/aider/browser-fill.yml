# Aider 自定义工具 — 填写表单
name: browser_fill
description: |
  在页面输入框中填写内容。用于登录、搜索、提交表单等场景。
parameters:
  selector:
    type: string
    description: 输入框的 CSS 选择器
  value:
    type: string
    description: 要填入的文本内容
command: ["venv-browser/bin/python", "tools/browser_mcp_cli.py", "fill", '{"selector": "{selector}", "value": "{value}"}']
