<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); color: #fff; padding: 30px 20px; text-align: center; }
  .header h1 { font-size: 24px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  .login-box { max-width: 400px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
  .login-box h2 { text-align: center; margin-bottom: 24px; color: #1e3a5f; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
  .char-count { font-size: 12px; color: #999; font-weight: 400; }
  .char-count.over { color: #dc2626; }
  .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #1e3a5f; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .2s; position: relative; }
  .btn-primary { background: #1e3a5f; color: #fff; width: 100%; padding: 12px; }
  .btn-primary:hover { background: #2d5a87; }
  .btn-danger { background: #dc2626; color: #fff; padding: 6px 12px; font-size: 12px; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-warning { background: #f59e0b; color: #fff; padding: 6px 12px; font-size: 12px; }
  .btn-warning:hover { background: #d97706; }
  .btn-success { background: #059669; color: #fff; }
  .btn-success:hover { background: #047857; }
  .btn-info { background: #3b82f6; color: #fff; }
  .btn-info:hover { background: #2563eb; }
  .btn-logout { background: #6b7280; color: #fff; }
  .btn-logout:hover { background: #4b5563; }
  .btn-cancel { background: #e5e7eb; color: #333; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; text-align: center; }
  .task-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .panel { display: none; }
  .panel.active { display: block; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .toolbar h2 { font-size: 18px; color: #1e3a5f; }
  .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .toolbar-actions .btn { height: 38px; }
  .site-table { width: 100%; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); table-layout: fixed; }
  .site-table th { background: #f8fafc; padding: 12px 14px; text-align: left; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
  .site-table td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .site-table th:first-child, .site-table td:first-child { width: 52px; }
  .site-table th:nth-child(2), .site-table td:nth-child(2) { width: 200px; }
  .site-table th:nth-child(3), .site-table td:nth-child(3) { }
  .site-table th:nth-child(4), .site-table td:nth-child(4) { width: 110px; }
  .site-table th:nth-child(5), .site-table td:nth-child(5) { width: 78px; padding-left: 8px; padding-right: 8px; }
  .site-table th:last-child, .site-table td:last-child { width: 164px; padding-left: 8px; padding-right: 8px; overflow-x: hidden; }
  .site-table .url-cell { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .site-table tr:last-child td { border-bottom: none; }
  .site-table tr:hover { background: #fafbfc; }
  .site-table tr.hidden-row { opacity: 0.5; }
  .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; white-space: nowrap; }
  .status-active { background: #d1fae5; color: #047857; }
  .status-hidden { background: #fee2e2; color: #b91c1c; }
  .action-btns { display: flex; gap: 4px; flex-wrap: nowrap; justify-content: center; }
  .action-btns .btn { padding: 6px 10px; font-size: 12px; white-space: nowrap; }
  /* 搜索框（内联在工具栏第一行，右侧内嵌模式下拉，与按钮等高对齐） */
  .toolbar-search { display: flex; align-items: stretch; flex: 0 1 300px; min-width: 200px; margin-left: auto; height: 38px; background: #fff; border: 1px solid #ddd; border-radius: 8px; transition: border-color .15s; overflow: hidden; }
  .toolbar-search:focus-within { border-color: #1e3a5f; }
  .toolbar-search input { flex: 1; min-width: 0; border: none; outline: none; background: transparent; padding: 0 12px; font-size: 14px; color: #333; }
  .toolbar-search select { flex-shrink: 0; border: none; outline: none; background: #f1f5f9; border-left: 1px solid #ddd; padding: 0 6px; font-size: 13px; color: #555; cursor: pointer; }
  /* 翻页组件（与标书看板同一套） */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; }
  .pagination button { padding: 8px 16px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all .15s; }
  .pagination button:hover:not(:disabled) { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination .page-input { width: 52px; padding: 7px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; text-align: center; outline: none; color: #333; -moz-appearance: textfield; appearance: textfield; }
  .pagination .page-input::-webkit-outer-spin-button, .pagination .page-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .pagination .page-input:focus { border-color: #1e3a5f; }
  .pagination .page-total { font-size: 14px; color: #555; }
  .add-form { background: #fff; padding: 24px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); display: none; }
  .add-form.active { display: block; }
  .add-form h3 { margin-bottom: 16px; color: #1e3a5f; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-actions { margin-top: 16px; display: flex; gap: 10px; }

  /* 弹窗 */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 1000; display: none; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 92%; max-width: 780px; max-height: 88vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: modalIn .25s ease; }
  @keyframes modalIn { from { transform: scale(.95) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #eee; flex-shrink: 0; }
  .modal-header h3 { font-size: 18px; color: #1e3a5f; }
  .modal-close { width: 32px; height: 32px; border: none; background: #f3f4f6; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #666; }
  .modal-close:hover { background: #e5e7eb; }
  .modal-body { padding: 20px 24px; flex: 1; overflow-y: auto; min-height: 0; }

  /* 统计 */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { text-align: center; padding: 12px 8px; background: #f8fafc; border-radius: 10px; }
  .stat-card .label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 700; color: #1e3a5f; }
  .overall-progress { margin-bottom: 20px; }
  .overall-progress .bar { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
  .overall-progress .fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #1e3a5f); transition: width 0.3s; }
  .overall-progress .text { font-size: 12px; color: #888; margin-top: 4px; text-align: right; }

  /* 站点卡片 */
  .site-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: box-shadow .2s; }
  .site-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .site-card.expanded { border-color: #3b82f6; }
  .site-card-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 12px; }
  .site-card-header:hover { background: #fafbfc; }
  .site-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .site-icon.idle { background: #f3f4f6; }
  .site-icon.scraping { background: #dbeafe; }
  .site-icon.llm_waiting { background: #fef3c7; }
  .site-icon.llm_extracting { background: #ede9fe; }
  .site-icon.completed { background: #d1fae5; }
  .site-icon.failed { background: #fee2e2; }
  .site-icon.cancelled { background: #fee2e2; }
  .site-info { flex: 1; min-width: 0; }
  .site-name-row { display: flex; align-items: center; gap: 8px; }
  .site-name-row .name { font-weight: 600; font-size: 14px; color: #1e3a5f; }
  .site-name-row .status-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .status-tag.idle { background: #f3f4f6; color: #666; }
  .status-tag.scraping { background: #dbeafe; color: #1d4ed8; }
  .status-tag.llm_waiting { background: #fef3c7; color: #b45309; }
  .status-tag.llm_extracting { background: #ede9fe; color: #6d28d9; }
  .status-tag.completed { background: #d1fae5; color: #047857; }
  .status-tag.failed { background: #fee2e2; color: #b91c1c; }
  .status-tag.cancelled { background: #fee2e2; color: #b91c1c; }
  .site-progress-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .site-progress-bar { flex: 1; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
  .site-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .site-progress-fill.idle { width: 0; background: #ccc; }
  .site-progress-fill.scraping { width: 40%; background: #3b82f6; animation: pp 1.5s infinite; }
  .site-progress-fill.llm_waiting { width: 50%; background: #f59e0b; }
  .site-progress-fill.llm_extracting { width: 75%; background: #8b5cf6; animation: pp 1.5s infinite; }
  .site-progress-fill.completed { width: 100%; background: #059669; }
  .site-progress-fill.failed { width: 100%; background: #dc2626; }
  .site-progress-fill.cancelled { width: 100%; background: #f59e0b; }
  @keyframes pp { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
  .site-meta { font-size: 11px; color: #999; margin-top: 4px; }
  .expand-arrow { color: #999; font-size: 12px; transition: transform .2s; flex-shrink: 0; }
  .site-card.expanded .expand-arrow { transform: rotate(90deg); }
  .site-terminal-wrap { display: none; border-top: 1px solid #eee; }
  .site-card.expanded .site-terminal-wrap { display: block; }
  .site-terminal { background: #f8f9fa; color: #333333; border: 1px solid #e5e7eb; padding: 14px; font-family: 'Monaco', 'Menlo', 'Consolas', monospace; font-size: 12px; line-height: 1.7; overflow-y: auto; border-radius: 6px; }
  .site-terminal::-webkit-scrollbar { width: 6px; }
  .site-terminal::-webkit-scrollbar-track { background: transparent; }
  .site-terminal::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .log-content { background: #f8f9fa; color: #333333; padding: 14px; font-family: 'Monaco', 'Menlo', 'Consolas', monospace; font-size: 12px; line-height: 1.7; overflow-y: auto; border-radius: 6px; max-height: 400px; }
  .log-content::-webkit-scrollbar { width: 6px; }
  .log-content::-webkit-scrollbar-track { background: transparent; }
  .log-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.success { color: #4ade80; }
  .log-line.warning { color: #fbbf24; }
  .log-line.error { color: #f87171; }
  .empty-state { text-align: center; padding: 60px; color: #888; }

  /* 订阅词气泡 */
  .kw-bubbles { display: flex; flex-wrap: wrap; gap: 10px; }
  .kw-bubble { position: relative; display: inline-flex; align-items: center; padding: 8px 16px; background: #eef4fb; border: 1px solid #d0e2f5; border-radius: 20px; font-size: 14px; color: #1e3a5f; transition: all .2s; }
  .kw-bubble:hover { background: #e0edfa; box-shadow: 0 2px 6px rgba(30,58,95,.1); }
  .kw-x { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: #dc2626; color: #fff; font-size: 11px; line-height: 18px; text-align: center; cursor: pointer; opacity: 0; transition: opacity .15s; border: none; padding: 0; }
  .kw-bubble:hover .kw-x { opacity: 1; }
  .kw-empty { color: #999; font-size: 14px; text-align: center; padding: 30px 0; }

  /* 任务列表 */
  .task-list-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: all .2s; }
  .task-list-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .task-list-item.expanded { border-color: #3b82f6; }
  .task-list-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 12px; }
  .task-list-header:hover { background: #fafbfc; }
  .task-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .task-icon.batch { background: #dbeafe; }
  .task-icon.generate { background: #fef3c7; }
  .task-info { flex: 1; min-width: 0; }
  .task-name-row { display: flex; align-items: center; gap: 8px; }
  .task-name-row .name { font-weight: 600; font-size: 14px; color: #1e3a5f; }
  .task-name-row .type-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .type-tag.batch { background: #dbeafe; color: #1d4ed8; }
  .type-tag.generate { background: #fef3c7; color: #b45309; }
  .task-status-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .task-status-tag.running { background: #dbeafe; color: #1d4ed8; }
  .task-status-tag.completed { background: #d1fae5; color: #047857; }
  .task-status-tag.failed { background: #fee2e2; color: #b91c1c; }
  .task-status-tag.pending { background: #f3f4f6; color: #666; }
  .task-status-tag.cancelled { background: #fef3c7; color: #b45309; }
  .task-meta { font-size: 11px; color: #999; margin-top: 4px; }
  .task-terminal-wrap { display: none; border-top: 1px solid #eee; }
  .task-list-item.expanded .task-terminal-wrap { display: block; }
</style>
</head>
<body>
<div class="header"><h1>管理员面板</h1></div>
<div class="container">
  <div id="loginPage" class="login-box">
    <h2>管理员登录</h2>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="passwordInput" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
    <div class="error-msg" id="loginError"></div>
  </div>
  <div id="adminPanel" class="panel">
    <div class="toolbar">
      <h2>网站管理</h2>
      <div class="toolbar-search">
        <input type="text" id="adminSiteSearch" placeholder="名称/别名/描述" oninput="onAdminSearch()">
        <select id="adminSearchMode" onchange="onAdminSearch()" title="搜索模式">
          <option value="text" selected>文字</option>
          <option value="url">网址</option>
        </select>
      </div>
      <div class="toolbar-actions">
        <button class="btn btn-info" onclick="openTaskModal()">📋 历史任务</button>
        <button class="btn btn-info" onclick="openKeywordModal()">🏷️ 订阅词管理</button>
        <button class="btn btn-success" onclick="startBatchScrape()">重新爬取昨日数据</button>
        <button class="btn btn-success" onclick="toggleAddForm()">+ 添加网站</button>
        <button class="btn btn-logout" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="add-form" id="addForm">
      <h3>添加新网站</h3>
      <div class="form-row">
        <div class="form-group"><label>网站名称 * <span class="char-count" id="siteNameCount">0/15</span></label><input type="text" id="siteName" maxlength="15" placeholder="如：中国农业银行" oninput="updateCharCount('siteName','siteNameCount')"></div>
        <div class="form-group"><label>网站地址 *</label><input type="text" id="siteUrl" placeholder="https://example.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>爬虫名称（可选）</label><input type="text" id="siteScraper" placeholder="留空自动推导"></div>
        <div class="form-group"><label>描述（可选）</label><input type="text" id="siteDesc" placeholder="网站描述"></div>
      </div>
      <div class="form-group">
        <label>搜索别名（可选，用于模糊搜索，如官方名/简称，可添加多个）</label>
        <div id="aliasesContainer" style="margin-bottom: 8px;"></div>
        <button type="button" class="btn btn-info" onclick="addAliasField()" style="padding: 6px 12px; font-size: 12px;">+ 添加别名</button>
      </div>
      <div class="form-group">
        <label>参考 URL（可选，用于学习页面结构）</label>
        <div id="refUrlsContainer" style="margin-bottom: 8px;"></div>
        <button type="button" class="btn btn-info" onclick="addRefUrlField()" style="padding: 6px 12px; font-size: 12px;">+ 添加参考URL</button>
      </div>
      <div class="form-actions">
        <button class="btn btn-success" onclick="addSite()">确认添加</button>
        <button class="btn btn-cancel" onclick="toggleAddForm()">取消</button>
      </div>
    </div>
    <div id="siteList"><div class="empty-state">加载中...</div></div>
    <div class="pagination" id="adminPagination" style="display:none">
      <button id="adminFirstBtn" onclick="adminGoPage(1)">首页</button>
      <button id="adminPrevBtn" onclick="adminGoPage(adminCurrentPage-1)">上一页</button>
      <input type="number" class="page-input" id="adminPageInput" min="1" onkeydown="if(event.key==='Enter')adminDoJump()">
      <span class="page-total">/ <span id="adminTotalPagesSpan"></span></span>
      <button id="adminNextBtn" onclick="adminGoPage(adminCurrentPage+1)">下一页</button>
      <button id="adminLastBtn" onclick="adminGoPage(adminTotalPages)">尾页</button>
    </div>
  </div>
</div>

<!-- 历史任务弹窗 -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 历史任务</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="modal-close" onclick="closeTaskModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="taskListBody">
      <div class="empty-state">加载中...</div>
    </div>
  </div>
</div>

<!-- 订阅词管理弹窗 -->
<div class="modal-overlay" id="keywordModal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3>🏷️ 订阅词管理</h3>
      <button class="modal-close" onclick="closeKeywordModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="text" id="keywordInput" placeholder="输入订阅词" style="flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px" onkeydown="if(event.key==='Enter')addKeyword()">
        <button class="btn btn-success" onclick="addKeyword()" style="white-space:nowrap">添加</button>
      </div>
      <div id="keywordList"><div class="empty-state">加载中...</div></div>
    </div>
  </div>
</div>

<!-- 编辑网站弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>编辑网站</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <div class="form-group">
          <label>网站名称 * <span class="char-count" id="editNameCount">0/15</span></label>
          <input type="text" id="editName" maxlength="15" required oninput="updateCharCount('editName','editNameCount')">
        </div>
        <div class="form-group">
          <label>网站描述</label>
          <input type="text" id="editDescription">
        </div>
        <div class="form-group">
          <label>搜索别名（用于模糊搜索，可添加多个）</label>
          <div id="aliasesContainerEdit" style="margin-bottom: 8px;"></div>
          <button type="button" class="btn btn-info" onclick="addAliasField('aliasesContainerEdit')" style="padding: 6px 12px; font-size: 12px;">+ 添加别名</button>
        </div>
        <div class="form-group">
          <label>网站URL（不可修改）</label>
          <input type="text" id="editUrl" readonly style="background:#f5f5f5;">
        </div>
        <div class="form-group">
          <label>爬虫名称（不可修改）</label>
          <input type="text" id="editScraperName" readonly style="background:#f5f5f5;">
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
          <button type="button" class="btn btn-success" onclick="saveSite()">保存</button>
          <button type="button" class="btn btn-cancel" onclick="closeEditModal()">取消</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
let adminToken = '';
let pollTimer = null;
let expandedTasks = new Set();

const STATUS_LABELS = { idle:'等待中', pending:'等待中', running:'运行中', scraping:'爬虫执行中', llm_waiting:'LLM等待中', llm_extracting:'LLM提取中', completed:'已完成', success:'成功', failed:'失败', cancelled:'已终止' };
const STATUS_ICONS = { idle:'⏳', pending:'⏳', running:'🔄', scraping:'🔍', llm_waiting:'⏳', llm_extracting:'🤖', completed:'✅', success:'✅', failed:'❌', cancelled:'🛑' };

async function doLogin() {
  const pwd = document.getElementById('passwordInput').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!pwd) { errEl.textContent = '请输入密码'; return; }
  try {
    const resp = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
    if (!resp.ok) { const err = await resp.json(); errEl.textContent = err.detail || '登录失败'; return; }
    const data = await resp.json();
    adminToken = data.token;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').classList.add('active');
    loadSites();
    loadTaskHistory();
  } catch (e) { errEl.textContent = '网络错误: ' + e.message; }
}

function doLogout() {
  adminToken = '';
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('adminPanel').classList.remove('active');
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('passwordInput').value = '';
}

// ============ 站点列表：搜索 + 分页（14个/页，复用标书看板翻页组件） ============
const ADMIN_PER_PAGE = 14;
let allSites = [];
let adminCurrentPage = 1;
let adminTotalPages = 1;

async function loadSites() {
  try {
    const resp = await fetch('/api/admin/sites', { headers: { 'X-Admin-Token': adminToken } });
    if (resp.status === 401) { doLogout(); return; }
    allSites = (await resp.json()) || [];
    renderAdminSites();
  } catch (e) { document.getElementById('siteList').innerHTML = '<div class="empty-state" style="color:#dc2626">加载失败</div>'; }
}

function adminEscapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function adminIsSubsequence(kw, target) { let i = 0; for (let j = 0; j < target.length && i < kw.length; j++) { if (target[j] === kw[i]) i++; } return i === kw.length; }
function adminSiteMatchScore(site, kw) {
  let re;
  try { re = new RegExp(kw, 'i'); } catch (e) { re = new RegExp(adminEscapeRegExp(kw), 'i'); }
  let score = 0;
  if (re.test(site.name || '')) score += 100;
  if ((site.aliases || []).some(a => re.test(a))) score += 60;
  if ((site.description || '') && re.test(site.description)) score += 30;
  if (score === 0 && kw.length >= 2) {
    const k = kw.toLowerCase();
    if (adminIsSubsequence(k, (site.name || '').toLowerCase()) || (site.aliases || []).some(a => adminIsSubsequence(k, a.toLowerCase()))) score += 10;
  }
  return score;
}
// ---- URL 搜索引擎：忽略协议/端口/路径，对域名做正则 + 模糊匹配 ----
function normalizeHost(u) {
  if (!u) return '';
  let s = String(u).trim().toLowerCase();
  s = s.replace(/^[a-z][a-z0-9+.-]*:\/\//, '');  // 去掉 http:// https:// 等协议
  s = s.replace(/[/?#].*$/, '');                   // 去掉路径 / 查询参数 / 锚点
  s = s.replace(/:\d+$/, '');                       // 去掉端口号
  s = s.replace(/^www\./, '');                      // 去掉 www. 前缀
  return s;
}
function adminUrlMatchScore(site, kw) {
  const host = normalizeHost(site.url);
  const k = normalizeHost(kw);
  if (!host || !k) return 0;
  let re;
  try { re = new RegExp(k, 'i'); } catch (e) { re = new RegExp(adminEscapeRegExp(k), 'i'); }
  if (re.test(host)) return 100;
  if (k.length >= 2 && adminIsSubsequence(k, host)) return 10;
  return 0;
}

function getFilteredSites() {
  const kw = (document.getElementById('adminSiteSearch').value || '').trim();
  if (!kw) return allSites;
  const mode = document.getElementById('adminSearchMode').value;
  const scorer = mode === 'url' ? adminUrlMatchScore : adminSiteMatchScore;
  return allSites
    .map(s => ({ s, score: scorer(s, kw) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.s);
}
function onAdminSearch() {
  const mode = document.getElementById('adminSearchMode').value;
  document.getElementById('adminSiteSearch').placeholder = mode === 'url' ? '搜索网址' : '名称/别名/描述';
  adminCurrentPage = 1;
  renderAdminSites();
}

function buildSiteTable(sites) {
  let html = '<table class="site-table"><thead><tr><th>ID</th><th>名称</th><th>网址</th><th>爬虫</th><th>状态</th><th>操作</th></tr></thead><tbody>';
  for (const s of sites) {
    const isHidden = s.hidden;
    const statusClass = isHidden ? 'status-hidden' : 'status-active';
    const statusText = isHidden ? '已隐藏' : '运行中';
    const rowClass = isHidden ? 'hidden-row' : '';
    const hideBtn = isHidden ? `<button class="btn btn-warning" onclick="unhideSite(${s.id})">显示</button>` : `<button class="btn btn-warning" onclick="hideSite(${s.id})">隐藏</button>`;
    const editBtn = `<button class="btn btn-info" onclick="openEditModal(${s.id})">编辑</button>`;
    html += `<tr class="${rowClass}">
    <td>${s.id}</td>
    <td><strong>${esc(s.name)}</strong><br><small style="color:#888">${esc(s.description||'')}</small></td>
    <td><a href="${esc(s.url)}" target="_blank" class="url-cell" title="${esc(s.url)}" style="color:#2563eb">${esc(s.url)}</a></td>
    <td><code>${esc(s.scraper_name||'-')}</code></td>
    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
    <td><div class="action-btns">${editBtn}${hideBtn}<button class="btn btn-danger" onclick="deleteSite(${s.id}, '${esc(s.name)}')">删除</button></div></td>
  </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function renderAdminSites() {
  const filtered = getFilteredSites();
  const total = filtered.length;
  adminTotalPages = Math.max(1, Math.ceil(total / ADMIN_PER_PAGE));
  adminCurrentPage = Math.min(Math.max(1, adminCurrentPage), adminTotalPages);
  const start = (adminCurrentPage - 1) * ADMIN_PER_PAGE;
  const pageSites = filtered.slice(start, start + ADMIN_PER_PAGE);
  document.getElementById('siteList').innerHTML = total === 0
    ? '<div class="empty-state">' + (allSites.length ? '无匹配结果' : '暂无网站数据') + '</div>'
    : buildSiteTable(pageSites);
  updateAdminPagination();
}

function updateAdminPagination() {
  document.getElementById('adminPagination').style.display = adminTotalPages > 1 ? 'flex' : 'none';
  document.getElementById('adminPageInput').value = adminCurrentPage;
  document.getElementById('adminPageInput').max = adminTotalPages;
  document.getElementById('adminTotalPagesSpan').textContent = adminTotalPages;
  document.getElementById('adminPrevBtn').disabled = adminCurrentPage <= 1;
  document.getElementById('adminNextBtn').disabled = adminCurrentPage >= adminTotalPages;
  document.getElementById('adminFirstBtn').disabled = adminCurrentPage <= 1;
  document.getElementById('adminLastBtn').disabled = adminCurrentPage >= adminTotalPages;
}

function adminGoPage(p) { if (p < 1 || p > adminTotalPages) return; adminCurrentPage = p; renderAdminSites(); }
function adminDoJump() {
  const input = document.getElementById('adminPageInput');
  const p = parseInt(input.value);
  if (p >= 1 && p <= adminTotalPages && p !== adminCurrentPage) adminGoPage(p);
  else { input.style.borderColor = '#dc2626'; setTimeout(() => input.style.borderColor = '#d1d5db', 1000); input.value = adminCurrentPage; }
}

function toggleAddForm() { 
  const form = document.getElementById('addForm');
  form.classList.toggle('active');
  if (form.classList.contains('active')) {
    // 表单打开时，初始化一个空的参考URL输入框
    const container = document.getElementById('refUrlsContainer');
    container.innerHTML = '';
    addRefUrlField();
    // 初始化一个空的别名输入框
    const aliasContainer = document.getElementById('aliasesContainer');
    aliasContainer.innerHTML = '';
    addAliasField();
  }
}

function addRefUrlField() {
  const container = document.getElementById('refUrlsContainer');
  const index = container.children.length;
  const div = document.createElement('div');
  div.className = 'ref-url-item';
  div.style.display = 'flex';
  div.style.gap = '8px';
  div.style.marginBottom = '8px';
  div.innerHTML = `
    <input type="text" class="ref-url-input" placeholder="https://example.com/detail/${index + 1}" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    <button type="button" class="btn btn-danger" onclick="removeRefUrlField(this)" style="padding: 6px 12px; font-size: 12px;">✕</button>
  `;
  container.appendChild(div);
}

function removeRefUrlField(button) {
  const container = document.getElementById('refUrlsContainer');
  if (container.children.length > 1) {
    button.parentElement.remove();
  } else {
    alert('至少保留一个参考URL输入框');
  }
}

function addAliasField(containerId = 'aliasesContainer', value = '') {
  const container = document.getElementById(containerId);
  const div = document.createElement('div');
  div.style.display = 'flex';
  div.style.gap = '8px';
  div.style.marginBottom = '8px';
  div.innerHTML = `
    <input type="text" class="alias-input" placeholder="如：中国农业银行" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
    <button type="button" class="btn btn-danger" onclick="removeAliasField(this)" style="padding: 6px 12px; font-size: 12px;">✕</button>
  `;
  container.appendChild(div);
  div.querySelector('.alias-input').value = value;  // 通过属性赋值，避免特殊字符注入
}

function removeAliasField(button) { button.parentElement.remove(); }

function collectAliases(containerId) {
  return Array.from(document.querySelectorAll('#' + containerId + ' .alias-input'))
    .map(i => i.value.trim())
    .filter(v => v.length > 0);
}

function updateCharCount(inputId, countId) {
  const len = document.getElementById(inputId).value.length;
  const el = document.getElementById(countId);
  el.textContent = len + '/15';
  el.classList.toggle('over', len >= 15);
}
function formatApiError(detail, fallback) {
  if (!detail) return fallback;
  if (typeof detail === 'string') return detail;
  if (Array.isArray(detail)) {
    // Pydantic 校验错误数组，提取可读信息
    return detail.map(e => {
      const field = (e.loc || []).slice(1).join('.');
      return (field ? '【' + field + '】' : '') + (e.msg || JSON.stringify(e));
    }).join('\n');
  }
  return fallback;
}

async function addSite() {
  const name = document.getElementById('siteName').value.trim();
  const url = document.getElementById('siteUrl').value.trim();
  const scraper = document.getElementById('siteScraper').value.trim();
  const desc = document.getElementById('siteDesc').value.trim();
  
  if (!name || !url) { alert('请填写网站名称和地址'); return; }
  if (name.length > 15) { alert('网站名称最多15个字'); return; }
  if (scraper && !/^[a-zA-Z0-9_]+$/.test(scraper)) { alert('爬虫名称仅允许英文、数字、下划线'); return; }
  
  // 收集所有非空的参考URL输入框的值
  const refUrlInputs = document.querySelectorAll('.ref-url-input');
  const reference_urls = Array.from(refUrlInputs)
    .map(input => input.value.trim())
    .filter(url => url.length > 0);
  
  // 收集所有非空的别名输入框的值
  const aliases = collectAliases('aliasesContainer');
  
  try {
    const resp = await fetch('/api/admin/sites', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken }, 
      body: JSON.stringify({ 
        name, 
        url, 
        scraper_name: scraper || null, 
        description: desc || null,
        aliases: aliases.length > 0 ? aliases : null,
        reference_urls: reference_urls.length > 0 ? reference_urls : null
      }) 
    });
    if (!resp.ok) { const err = await resp.json(); alert(formatApiError(err.detail, '添加失败')); return; }
    const result = await resp.json();
    alert(result.message || '网站已添加，爬虫正在生成');
    toggleAddForm();
    ['siteName','siteUrl','siteScraper','siteDesc'].forEach(id => document.getElementById(id).value = '');
    loadSites();
    loadTaskHistory();
  } catch (e) { alert('网络错误: ' + e.message); }
}

async function hideSite(id) { try { await fetch(`/api/admin/sites/${id}/hide`, { method: 'POST', headers: { 'X-Admin-Token': adminToken } }); loadSites(); } catch (e) { alert('操作失败'); } }
async function unhideSite(id) { try { await fetch(`/api/admin/sites/${id}/unhide`, { method: 'POST', headers: { 'X-Admin-Token': adminToken } }); loadSites(); } catch (e) { alert('操作失败'); } }

async function deleteSite(id, name) {
  if (!confirm(`确定要删除网站「${name}」吗？此操作不可恢复！`)) return;
  if (!confirm(`再次确认：删除「${name}」？`)) return;
  try {
    const resp = await fetch(`/api/admin/sites/${id}`, { method: 'DELETE', headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail || '删除失败'); return; }
    loadSites();
  } catch (e) { alert('网络错误'); }
}

// ============ 统一任务列表 ============

function openTaskModal() {
  document.getElementById('taskModal').classList.add('active');
  document.body.style.overflow = 'hidden';
  loadTaskHistory();
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('active');
  document.body.style.overflow = '';
  expandedTasks.clear();
}

// 点击 modal 外部关闭
document.getElementById('taskModal').addEventListener('click', function(e) {
  if (e.target === this) closeTaskModal();
});

async function loadTaskHistory() {
  try {
    const resp = await fetch('/api/admin/tasks', { headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { document.getElementById('taskListBody').innerHTML = '<div class="empty-state" style="color:#dc2626">加载失败</div>'; return; }
    const data = await resp.json();
    const tasks = data.tasks || [];
    
    // 检查是否已有任务 DOM（非首次加载）
    const existingTaskIds = new Set();
    document.querySelectorAll('.task-list-item[id]').forEach(el => {
      const id = el.id.replace('task-', '');
      existingTaskIds.add(id);
    });
    
    const needsFullRender = existingTaskIds.size === 0 || tasks.length !== existingTaskIds.size;
    
    if (needsFullRender) {
      // 首次加载或任务数量变化：完整渲染
      renderTaskHistory(tasks);
    } else {
      // 轮询更新：只更新状态，不重建 DOM，保留滚动位置
      for (const t of tasks) {
        const item = document.getElementById('task-' + t.task_id);
        if (!item) continue;
        const status = t.status;
        const statusLabel = STATUS_LABELS[status] || status;
        const statusClass = ['running','scraping','llm_extracting'].includes(status) ? 'running' : (status === 'completed' || status === 'success') ? 'completed' : status;
        // 更新状态标签
        const statusTag = item.querySelector('.task-status-tag');
        if (statusTag) {
          statusTag.textContent = statusLabel;
          statusTag.className = 'task-status-tag ' + statusClass;
        }
        // 更新耗时
        const duration = t.duration ? `${Math.round(t.duration)}s` : '-';
        const metaEl = item.querySelector('.task-meta');
        if (metaEl) {
          const createdTime = t.created_at ? new Date(t.created_at * 1000).toLocaleString('zh-CN') : '未知';
          metaEl.textContent = `${createdTime} | 耗时: ${duration}`;
        }
        // 更新终止按钮显隐
        const header = item.querySelector('.task-list-header');
        const existingCancel = header.querySelector('.btn-danger');
        if (status === 'running' && !existingCancel) {
          const btn = document.createElement('button');
          btn.className = 'btn btn-danger';
          btn.style.marginRight = '8px';
          btn.textContent = '终止';
          btn.onclick = (e) => { e.stopPropagation(); cancelTask(t.task_id, t.type); };
          header.insertBefore(btn, header.querySelector('.expand-arrow'));
        } else if (status !== 'running' && existingCancel) {
          existingCancel.remove();
        }
      }
    }
    
    // 如果有 running 的任务，启动轮询
    const hasRunning = tasks.some(t => t.status === 'running');
    if (hasRunning) {
      startPolling();
    } else {
      stopPolling();
    }
  } catch (e) { document.getElementById('taskListBody').innerHTML = '<div class="empty-state" style="color:#dc2626">网络错误</div>'; }
}

function renderTaskHistory(tasks) {
  if (tasks.length === 0) { 
    document.getElementById('taskListBody').innerHTML = '<div class="empty-state">暂无历史任务</div>'; 
    return; 
  }
  
  let html = '';
  for (const t of tasks) {
    const isExpanded = expandedTasks.has(t.task_id);
    const typeLabel = t.type === 'batch_scrape' ? '批量爬取' : '生成爬虫';
    const typeClass = t.type === 'batch_scrape' ? 'batch' : 'generate';
    const icon = t.type === 'batch_scrape' ? '📊' : '🔧';
    const status = t.status;
    const statusLabel = STATUS_LABELS[status] || status;
    const statusClass = ['running','scraping','llm_extracting'].includes(status) ? 'running' : (status === 'completed' || status === 'success') ? 'completed' : status;
    const createdTime = t.created_at ? new Date(t.created_at * 1000).toLocaleString('zh-CN') : '未知';
    const duration = t.duration ? `${Math.round(t.duration)}s` : '-';
    const meta = `${createdTime} | 耗时: ${duration}`;
    
    html += `<div class="task-list-item ${isExpanded ? 'expanded' : ''}" id="task-${t.task_id}">
      <div class="task-list-header" onclick="toggleTask('${t.task_id}', '${t.type}')">
        <div class="task-icon ${typeClass}">${icon}</div>
        <div class="task-info">
          <div class="task-name-row">
            <span class="name">${esc(t.description || '')}</span>
            <span class="type-tag ${typeClass}">${typeLabel}</span>
            <span class="task-status-tag ${statusClass}">${statusLabel}</span>
          </div>
          <div class="task-meta">${meta}</div>
        </div>
        ${status === 'running' ? `<button class="btn btn-danger" onclick="event.stopPropagation(); cancelTask('${t.task_id}', '${t.type}')" style="margin-right:8px">终止</button>` : ''}
        <span class="expand-arrow">▶</span>
      </div>
      <div class="task-terminal-wrap">
        <div class="site-terminal" id="terminal-${t.task_id}">加载中...</div>
      </div>
    </div>`;
  }
  document.getElementById('taskListBody').innerHTML = html;
}

async function toggleTask(taskId, taskType) {
  const el = document.getElementById('task-' + taskId);
  if (!el) return;
  
  if (expandedTasks.has(taskId)) {
    expandedTasks.delete(taskId);
    el.classList.remove('expanded');
    // 收起时重置渲染标记，下次展开重新全量渲染
    const terminal = document.getElementById('terminal-' + taskId);
    if (terminal) {
      delete terminal.dataset.rendered;
      delete terminal.dataset.lineCount;
    }
  } else {
    expandedTasks.add(taskId);
    el.classList.add('expanded');
    // 加载详情
    await loadTaskDetail(taskId, taskType);
  }
}

async function loadTaskDetail(taskId, taskType) {
  const terminal = document.getElementById('terminal-' + taskId);
  if (!terminal) return;
  
  try {
    if (taskType === 'batch_scrape') {
      const resp = await fetch(`/api/admin/batch-scrape/${taskId}`, { headers: { 'X-Admin-Token': adminToken } });
      if (!resp.ok) { terminal.innerHTML = '<div class="log-line error">加载失败</div>'; return; }
      const data = await resp.json();
      renderBatchDetail(terminal, data);
    } else if (taskType === 'generate_scraper') {
      const resp = await fetch(`/logs/${taskId}`, { headers: { 'X-Admin-Token': adminToken } });
      if (!resp.ok) { terminal.innerHTML = '<div class="log-line error">加载失败</div>'; return; }
      const data = await resp.json();
      renderGenerateDetail(terminal, data);
    }
  } catch (e) {
    terminal.innerHTML = '<div class="log-line error">网络错误</div>';
  }
}

function renderBatchDetail(container, data) {
  const sites = data.sites || [];
  const isUpdate = container.dataset.rendered === 'true';
  
  if (!isUpdate) {
    // ── 首次渲染：完整构建 ──
    let html = buildBatchStatsHtml(data);
    for (const s of sites) {
      html += buildSiteCardHtml(s);
    }
    container.innerHTML = html;
    container.dataset.rendered = 'true';
    container.scrollTop = container.scrollHeight;
    return;
  }
  
  // ── 增量更新：只改文字，不重建 DOM ──
  // 更新统计数字
  const statValues = container.querySelectorAll('.batch-stat-value');
  if (statValues.length >= 4) {
    statValues[0].textContent = data.total_sites;
    statValues[1].textContent = data.success_count;
    statValues[2].textContent = data.running_count;
    statValues[3].textContent = data.failed_count;
  }
  
  // 更新每个站点卡片
  for (const s of sites) {
    const card = container.querySelector(`[data-site-id="${s.site_id}"]`);
    if (!card) {
      // 新站点，追加卡片
      const tmp = document.createElement('div');
      tmp.innerHTML = buildSiteCardHtml(s);
      container.appendChild(tmp.firstElementChild);
      continue;
    }
    
    const sStatus = s.status || 'idle';
    const sLabel = STATUS_LABELS[sStatus] || sStatus;
    const sIcon = STATUS_ICONS[sStatus] || '⏳';
    const statusColors = { idle:{bg:'#f3f4f6',fg:'#666'}, scraping:{bg:'#dbeafe',fg:'#1d4ed8'}, llm_waiting:{bg:'#fef3c7',fg:'#b45309'}, llm_extracting:{bg:'#ede9fe',fg:'#6d28d9'}, completed:{bg:'#d1fae5',fg:'#047857'}, failed:{bg:'#fee2e2',fg:'#b91c1c'} };
    const sc = statusColors[sStatus] || statusColors.idle;
    
    // 更新图标
    const iconEl = card.querySelector('.site-card-icon');
    if (iconEl) { iconEl.textContent = sIcon; iconEl.style.background = sc.bg; }
    // 更新状态标签
    const badge = card.querySelector('.site-card-badge');
    if (badge) { badge.textContent = sLabel; badge.style.background = sc.bg; badge.style.color = sc.fg; }
    // 更新站点信息
    const infoEl = card.querySelector('.site-card-info');
    if (infoEl) {
      const siteInfo = sStatus === 'completed' ? `${s.rows} 条 → 提取 ${s.extracted_rows} 条 | ${s.duration}s`
        : sStatus === 'failed' ? (s.error || '失败')
        : sStatus === 'scraping' ? '爬取中...'
        : sStatus === 'llm_extracting' ? `已爬取 ${s.rows} 条，提取中...`
        : sStatus === 'llm_waiting' ? `已爬取 ${s.rows} 条，等待LLM` : '';
      infoEl.textContent = siteInfo;
    }
    
    // 增量更新日志：只追加新行
    const terminal = card.querySelector('.site-terminal');
    if (terminal && s.logs && s.logs.length > 0) {
      const existingCount = terminal.children.length;
      const allLogs = s.logs;
      if (allLogs.length > existingCount) {
        // 有新增日志行，只追加新的
        const wasTermAtBottom = terminal.scrollHeight - terminal.scrollTop - terminal.clientHeight < 20;
        for (let i = existingCount; i < allLogs.length; i++) {
          const div = document.createElement('div');
          div.className = 'log-line' + logClass(allLogs[i]);
          div.textContent = allLogs[i];
          terminal.appendChild(div);
        }
        if (wasTermAtBottom) terminal.scrollTop = terminal.scrollHeight;
      }
    } else if (!terminal && s.logs && s.logs.length > 0) {
      // 之前没有终端，现在有了，创建它
      const termDiv = document.createElement('div');
      termDiv.className = 'site-terminal';
      termDiv.style.cssText = 'border-top:1px solid #eee;padding:10px;font-size:11px;line-height:1.6;max-height:200px;overflow-y:auto';
      termDiv.innerHTML = s.logs.map(log => `<div class="log-line${logClass(log)}">${esc(log)}</div>`).join('');
      card.appendChild(termDiv);
    }
  }
}

  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:10px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">总站点</div>
      <div class="batch-stat-value" style="font-size:20px;font-weight:700;color:#1e3a5f">${data.total_sites}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:10px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">已完成</div>
      <div class="batch-stat-value" style="font-size:20px;font-weight:700;color:#059669">${data.success_count}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:10px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">进行中</div>
      <div class="batch-stat-value" style="font-size:20px;font-weight:700;color:#3b82f6">${data.running_count}</div>
    </div>
    <div style="text-align:center;padding:12px;background:#f8fafc;border-radius:10px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">失败</div>
      <div class="batch-stat-value" style="font-size:20px;font-weight:700;color:#dc2626">${data.failed_count}</div>
    </div>
  </div>`;
}

function buildSiteCardHtml(s) {
  const sStatus = s.status || 'idle';
  const sLabel = STATUS_LABELS[sStatus] || sStatus;
  const sIcon = STATUS_ICONS[sStatus] || '⏳';
  const statusColors = { idle:'background:#f3f4f6;color:#666', scraping:'background:#dbeafe;color:#1d4ed8', llm_waiting:'background:#fef3c7;color:#b45309', llm_extracting:'background:#ede9fe;color:#6d28d9', completed:'background:#d1fae5;color:#047857', failed:'background:#fee2e2;color:#b91c1c' };
  const statusStyle = statusColors[sStatus] || statusColors.idle;
  const siteInfo = sStatus === 'completed' ? `${s.rows} 条 → 提取 ${s.extracted_rows} 条 | ${s.duration}s`
    : sStatus === 'failed' ? (s.error || '失败')
    : sStatus === 'scraping' ? '爬取中...'
    : sStatus === 'llm_extracting' ? `已爬取 ${s.rows} 条，提取中...`
    : sStatus === 'llm_waiting' ? `已爬取 ${s.rows} 条，等待LLM` : '';
  
  let html = `<div data-site-id="${s.site_id}" style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:8px;overflow:hidden">
    <div style="display:flex;align-items:center;padding:12px;gap:12px">
      <div class="site-card-icon" style="width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:${statusStyle.split(';')[0]}">${sIcon}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:600;font-size:13px;color:#1e3a5f">${esc(s.site_name)}</span>
          <span class="site-card-badge" style="font-size:10px;padding:2px 8px;border-radius:12px;${statusStyle}">${sLabel}</span>
        </div>
        <div class="site-card-info" style="font-size:11px;color:#999;margin-top:2px">${esc(siteInfo)}</div>
      </div>
    </div>`;
  if (s.logs && s.logs.length > 0) {
    html += `<div class="site-terminal" style="border-top:1px solid #eee;padding:10px;font-size:11px;line-height:1.6;max-height:200px;overflow-y:auto">
      ${s.logs.map(log => `<div class="log-line${logClass(log)}">${esc(log)}</div>`).join('')}
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderGenerateDetail(container, data) {
  const log = data.log || '';
  const lines = log.split('\n');
  
  // 首次渲染
  if (!container.dataset.rendered) {
    let html = '<div class="site-terminal" style="padding:12px;max-height:500px;overflow-y:auto">';
    for (const line of lines) {
      if (line.trim()) {
        html += `<div class="log-line${logClass(line)}">${esc(line)}</div>`;
      } else {
        html += '<div style="height:4px"></div>';
      }
    }
    html += '</div>';
    container.innerHTML = html;
    container.dataset.rendered = 'true';
    container.dataset.lineCount = String(lines.length);
    const term = container.querySelector('.site-terminal');
    if (term) term.scrollTop = term.scrollHeight;
    return;
  }
  
  // 增量更新：只追加新行
  const prevCount = parseInt(container.dataset.lineCount || '0', 10);
  if (lines.length > prevCount) {
    const term = container.querySelector('.site-terminal');
    if (term) {
      const wasAtBottom = term.scrollHeight - term.scrollTop - term.clientHeight < 20;
      for (let i = prevCount; i < lines.length; i++) {
        const line = lines[i];
        const div = document.createElement('div');
        if (line.trim()) {
          div.className = 'log-line' + logClass(line);
          div.textContent = line;
        } else {
          div.style.height = '4px';
        }
        term.appendChild(div);
      }
      if (wasAtBottom) term.scrollTop = term.scrollHeight;
    }
    container.dataset.lineCount = String(lines.length);
  }
}

async function cancelTask(taskId, taskType) {
  if (!confirm('确定要终止此任务吗？')) return;
  try {
    if (taskType === 'batch_scrape') {
      const resp = await fetch(`/api/admin/batch-scrape/${taskId}/cancel`, { method: 'POST', headers: { 'X-Admin-Token': adminToken } });
      if (!resp.ok) { const err = await resp.json(); alert(err.detail || '终止失败'); return; }
    } else if (taskType === 'generate_scraper') {
      alert('生成爬虫任务暂不支持终止');
      return;
    }
    loadTaskHistory();
  } catch (e) { alert('网络错误: ' + e.message); }
}

function logClass(line) {
  if (line.includes('✓') || line.includes('成功') || line.includes('✅') || line.includes('完成')) return ' success';
  if (line.includes('⚠') || line.includes('警告')) return ' warning';
  if (line.includes('✗') || line.includes('失败') || line.includes('错误') || line.includes('❌')) return ' error';
  return '';
}

// ============ 批量爬取 ============

async function startBatchScrape() {
  if (!confirm('确定要重新爬取所有未隐藏网站的昨日数据吗？')) return;
  try {
    const resp = await fetch('/api/admin/batch-scrape?mode=yesterday', { method: 'POST', headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail || '启动失败'); return; }
    const data = await resp.json();
    alert(data.message);
    loadTaskHistory();
  } catch (e) { alert('网络错误: ' + e.message); }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    await loadTaskHistory();
    // 刷新展开的任务详情（renderBatchDetail/renderGenerateDetail 内部已处理滚动位置）
    for (const taskId of expandedTasks) {
      const el = document.getElementById('task-' + taskId);
      if (el) {
        const match = el.querySelector('.task-list-header').getAttribute('onclick').match(/'([^']+)',\s*'([^']+)'/);
        if (match) {
          await loadTaskDetail(taskId, match[2]);
        }
      }
    }
  }, 3000);
}

function stopPolling() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============ 编辑网站 ============

async function openEditModal(siteId) {
  // 获取网站信息
  try {
    const resp = await fetch(`/api/admin/sites`, { headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { alert('加载失败'); return; }
    const sites = await resp.json();
    const site = sites.find(s => s.id === siteId);
    
    if (!site) { alert('网站不存在'); return; }
    
    // 填充表单
    document.getElementById('editName').value = site.name || '';
    document.getElementById('editDescription').value = site.description || '';
    document.getElementById('editUrl').value = site.url || '';
    document.getElementById('editScraperName').value = site.scraper_name || '';
    updateCharCount('editName', 'editNameCount');
    
    // 填充别名输入框
    const aliasContainer = document.getElementById('aliasesContainerEdit');
    aliasContainer.innerHTML = '';
    const siteAliases = site.aliases || [];
    if (siteAliases.length > 0) {
      siteAliases.forEach(a => addAliasField('aliasesContainerEdit', a));
    } else {
      addAliasField('aliasesContainerEdit');
    }
    
    // 存储网站ID
    document.getElementById('editForm').dataset.siteId = siteId;
    
    // 显示模态框
    document.getElementById('editModal').classList.add('active');
  } catch (e) {
    alert('网络错误: ' + e.message);
  }
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
  document.getElementById('editForm').reset();
  delete document.getElementById('editForm').dataset.siteId;
}

async function saveSite() {
  const siteId = document.getElementById('editForm').dataset.siteId;
  const name = document.getElementById('editName').value.trim();
  const description = document.getElementById('editDescription').value.trim();
  const aliases = collectAliases('aliasesContainerEdit');
  
  if (!name) {
    alert('网站名称不能为空');
    return;
  }
  if (name.length > 15) { alert('网站名称最多15个字'); return; }
  
  try {
    const resp = await fetch(`/api/admin/sites/${siteId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Token': adminToken
      },
      body: JSON.stringify({
        name: name,
        description: description,
        aliases: aliases
      })
    });
    
    if (!resp.ok) {
      const err = await resp.json();
      alert(formatApiError(err.detail, '更新失败'));
      return;
    }
    
    alert('网站已更新');
    closeEditModal();
    loadSites();
  } catch (e) {
    alert('网络错误: ' + e.message);
  }
}

// 点击编辑模态框外部关闭
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});

// ============ 订阅词管理 ============

function openKeywordModal() {
  document.getElementById('keywordModal').classList.add('active');
  loadKeywords();
}

function closeKeywordModal() {
  document.getElementById('keywordModal').classList.remove('active');
}

document.getElementById('keywordModal').addEventListener('click', function(e) {
  if (e.target === this) closeKeywordModal();
});

async function loadKeywords() {
  try {
    const resp = await fetch('/api/admin/keywords', { headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { document.getElementById('keywordList').innerHTML = '<div class="empty-state" style="color:#dc2626">加载失败</div>'; return; }
    const keywords = await resp.json();
    renderKeywords(keywords);
  } catch (e) { document.getElementById('keywordList').innerHTML = '<div class="empty-state" style="color:#dc2626">网络错误</div>'; }
}

function renderKeywords(keywords) {
  if (!keywords || keywords.length === 0) {
    document.getElementById('keywordList').innerHTML = '<div class="kw-empty">暂无订阅词，请在上方添加</div>';
    return;
  }
  let html = '<div class="kw-bubbles">';
  for (const k of keywords) {
    html += `<span class="kw-bubble">${esc(k.word)}<button class="kw-x" title="删除" onclick="deleteKeyword(${k.id}, '${esc(k.word)}')">✕</button></span>`;
  }
  html += '</div>';
  document.getElementById('keywordList').innerHTML = html;
}

async function addKeyword() {
  const input = document.getElementById('keywordInput');
  const word = input.value.trim();
  if (!word) { alert('请输入订阅词'); return; }
  try {
    const resp = await fetch('/api/admin/keywords', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken },
      body: JSON.stringify({ word })
    });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail || '添加失败'); return; }
    input.value = '';
    loadKeywords();
  } catch (e) { alert('网络错误: ' + e.message); }
}

async function deleteKeyword(id, word) {
  if (!confirm(`确定删除订阅词「${word}」？`)) return;
  try {
    const resp = await fetch(`/api/admin/keywords/${id}`, { method: 'DELETE', headers: { 'X-Admin-Token': adminToken } });
    if (!resp.ok) { const err = await resp.json(); alert(err.detail || '删除失败'); return; }
    loadKeywords();
  } catch (e) { alert('网络错误'); }
}
