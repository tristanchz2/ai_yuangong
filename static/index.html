<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招标数据展示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 40px 20px; text-align: center; }
  .header h1 { font-size: 28px; margin-bottom: 8px; }
  .header .subtitle { font-size: 14px; opacity: 0.9; }
  .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

  /* 首页分类卡片 */
  .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-top: 20px; }
  .category-card { background: #fff; border-radius: 16px; padding: 40px 30px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .category-card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px rgba(0,0,0,.12); }
  .category-icon { font-size: 48px; margin-bottom: 16px; }
  .category-name { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 12px; }
  .category-stats { font-size: 14px; color: #888; line-height: 1.8; }
  .category-stats strong { color: #667eea; font-size: 20px; }

  /* 数据列表页 */
  .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-size: 14px; color: #555; transition: all 0.2s; margin-bottom: 20px; }
  .back-btn:hover { background: #667eea; color: #fff; border-color: #667eea; }
  .page-title { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  .page-meta { font-size: 13px; color: #888; margin-bottom: 20px; }

  /* 数据卡片 */
  .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: box-shadow .2s; }
  .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
  .card-title { font-size: 17px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
  .card-title a { color: #1a1a2e; text-decoration: none; }
  .card-title a:hover { color: #3b82f6; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 12px; padding: 2px 10px; border-radius: 12px; }
  .tag.source { background: #f1f5f9; color: #475569; }
  .tag.region { background: #fce7f3; color: #be185d; }
  .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; font-size: 13.5px; margin-bottom: 8px; }
  .card-row .label { color: #888; }
  .card-row .value { color: #333; }
  .summary { font-size: 13px; color: #666; margin-top: 6px; line-height: 1.6; }
  .keywords { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .kw { font-size: 11px; padding: 1px 8px; border-radius: 8px; background: #f5f5f5; color: #666; }
  .budget { font-weight: 600; color: #dc2626; }

  /* 翻页 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 24px; }
  .pagination button { padding: 8px 16px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all .15s; }
  .pagination button:hover:not(:disabled) { background: #667eea; color: #fff; border-color: #667eea; }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination .page-info { font-size: 14px; color: #555; min-width: 100px; text-align: center; }

  .loading { text-align: center; padding: 60px; font-size: 16px; color: #888; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>招标数据展示</h1>
  <div class="subtitle">点击分类查看详细数据</div>
</div>

<div class="container">
  <!-- 首页：分类选择 -->
  <div id="homePage">
    <div class="category-grid" id="categoryGrid">
      <div class="loading">正在加载分类...</div>
    </div>
  </div>

  <!-- 数据列表页 -->
  <div id="dataPage" class="hidden">
    <button class="back-btn" onclick="showHome()">← 返回首页</button>
    <div class="page-title" id="dataPageTitle"></div>
    <div class="page-meta" id="dataPageMeta"></div>
    <div id="cardContainer"></div>
    <div class="pagination" id="pagination" style="display:none">
      <button id="prevBtn" onclick="goPage(currentPage-1)">上一页</button>
      <span class="page-info" id="pageInfo"></span>
      <button id="nextBtn" onclick="goPage(currentPage+1)">下一页</button>
    </div>
  </div>
</div>

<script>
const PER_PAGE = 8;
const ICONS = { "采购公告": "📋", "结果公告": "✅", "其他": "📁" };
let allRecords = [];
let currentPage = 1;
let currentCategory = "";

// 加载分类
async function loadCategories() {
  try {
    const resp = await fetch('/api/categories?t=' + Date.now());
    const data = await resp.json();
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = data.categories.map(cat => {
      const icon = ICONS[cat.name] || '📂';
      const extTime = cat.latestExtractedAt ? new Date(cat.latestExtractedAt).toLocaleString('zh-CN') : '未知';
      return `
        <div class="category-card" onclick="showCategory('${cat.name}')">
          <div class="category-icon">${icon}</div>
          <div class="category-name">${cat.name}</div>
          <div class="category-stats">
            共 <strong>${cat.totalRecords}</strong> 条记录<br>
            数据来源文件：${cat.fileCount} 个<br>
            最近更新：${extTime}
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('categoryGrid').innerHTML = '<div class="loading" style="color:#dc2626">加载失败：' + e.message + '</div>';
  }
}

// 进入分类
async function showCategory(category) {
  currentCategory = category;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('dataPage').classList.remove('hidden');
  document.getElementById('dataPageTitle').textContent = category;
  document.getElementById('dataPageMeta').textContent = '加载中...';
  document.getElementById('cardContainer').innerHTML = '<div class="loading">正在加载数据...</div>';
  document.getElementById('pagination').style.display = 'none';

  try {
    const resp = await fetch(`/api/data/${encodeURIComponent(category)}?t=` + Date.now());
    const data = await resp.json();
    allRecords = data.records || [];
    document.getElementById('dataPageMeta').textContent = `共 ${allRecords.length} 条记录`;
    currentPage = 1;
    renderCards();
  } catch (e) {
    document.getElementById('cardContainer').innerHTML = '<div class="loading" style="color:#dc2626">加载失败：' + e.message + '</div>';
  }
}

// 返回首页
function showHome() {
  document.getElementById('dataPage').classList.add('hidden');
  document.getElementById('homePage').classList.remove('hidden');
  allRecords = [];
  loadCategories();
}

// 渲染卡片
function renderCards() {
  const total = allRecords.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PER_PAGE;
  const pageRecords = allRecords.slice(start, start + PER_PAGE);

  document.getElementById('cardContainer').innerHTML = pageRecords.map(r => {
    const budgetStr = r.budget != null ? '¥' + Number(r.budget).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) : '-';
    const keywords = (r.keywords || []).map(k => `<span class="kw">${esc(k)}</span>`).join('');
    return `
    <div class="card">
      <div class="card-title"><a href="${esc(r.url||'#')}" target="_blank">${esc(r.title||'无标题')}</a></div>
      <div class="tags">
        <span class="tag source">${esc(r.source||'')}</span>
        <span class="tag region">${esc(r.purchaser_region||'')}</span>
      </div>
      <div class="card-row">
        <div><span class="label">发布时间：</span><span class="value">${esc(r.publish_time||'-')}</span></div>
        <div><span class="label">招标时间：</span><span class="value">${esc(r.bid_time||'-')}</span></div>
        <div><span class="label">采购人：</span><span class="value">${esc(r.purchaser||'-')}</span></div>
        <div><span class="label">预算：</span><span class="value budget">${budgetStr}</span></div>
        <div><span class="label">服务类别：</span><span class="value">${esc(r.service_category||'-')}</span></div>
        <div><span class="label">服务地点：</span><span class="value">${esc(r.service_location||'-')}</span></div>
      </div>
      <div class="summary">${esc(r.summary||'')}</div>
      <div class="keywords">${keywords}</div>
    </div>`;
  }).join('');

  const pag = document.getElementById('pagination');
  pag.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

function goPage(p) {
  const totalPages = Math.ceil(allRecords.length / PER_PAGE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 初始化
loadCategories();
</script>
</body>
</html>

</style>

<body>
<div class="header">
  <h1>招标数据展示</h1>
  <div class="meta" id="metaInfo">加载中...</div>
</div>
<div id="container"><div class="loading">正在加载数据...</div></div>
<div class="pagination" id="pagination" style="display:none">
  <button id="prevBtn" onclick="goPage(currentPage-1)">上一页</button>
  <span class="page-info" id="pageInfo"></span>
  <button id="nextBtn" onclick="goPage(currentPage+1)">下一页</button>
</div>

<script>
const PER_PAGE = 8;
let allRecords = [];
let currentPage = 1;

async function loadData() {
  try {
    const resp = await fetch('/api/extracted-data?t=' + Date.now());
    const data = await resp.json();
    allRecords = data.records || [];
    const total = allRecords.length;
    const extractedAt = data.extractedAt ? new Date(data.extractedAt).toLocaleString('zh-CN') : '未知';
    document.getElementById('metaInfo').textContent = `共 ${total} 条记录 | 提取时间：${extractedAt}`;
    currentPage = 1;
    render();
  } catch (e) {
    document.getElementById('container').innerHTML = '<div class="loading" style="color:#dc2626">加载失败：' + e.message + '</div>';
  }
}

function render() {
  const total = allRecords.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PER_PAGE;
  const pageRecords = allRecords.slice(start, start + PER_PAGE);

  const container = document.getElementById('container');
  container.innerHTML = pageRecords.map(r => {
    const typeClass = r.notice_type === '结果公告' ? 'type-result' : (r.notice_type === '采购公告' ? 'type-purchase' : '');
    const budgetStr = r.budget != null ? '¥' + Number(r.budget).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) : '-';
    const keywords = (r.keywords || []).map(k => `<span class="kw">${esc(k)}</span>`).join('');
    return `
    <div class="card">
      <div class="card-title"><a href="${esc(r.url||'#')}" target="_blank">${esc(r.title||'无标题')}</a></div>
      <div class="tags">
        <span class="tag ${typeClass}">${esc(r.notice_type||'未知类型')}</span>
        <span class="tag source">${esc(r.source||'')}</span>
        <span class="tag region">${esc(r.purchaser_region||'')}</span>
      </div>
      <div class="card-row">
        <div><span class="label">发布时间：</span><span class="value">${esc(r.publish_time||'-')}</span></div>
        <div><span class="label">招标时间：</span><span class="value">${esc(r.bid_time||'-')}</span></div>
        <div><span class="label">采购人：</span><span class="value">${esc(r.purchaser||'-')}</span></div>
        <div><span class="label">预算：</span><span class="value budget">${budgetStr}</span></div>
        <div><span class="label">服务类别：</span><span class="value">${esc(r.service_category||'-')}</span></div>
        <div><span class="label">服务地点：</span><span class="value">${esc(r.service_location||'-')}</span></div>
      </div>
      <div class="summary">${esc(r.summary||'')}</div>
      <div class="keywords">${keywords}</div>
    </div>`;
  }).join('');

  // pagination
  const pag = document.getElementById('pagination');
  pag.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

function goPage(p) {
  const totalPages = Math.ceil(allRecords.length / PER_PAGE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 每次刷新重新读取
loadData();
</script>
</body>
</html>
